<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT Autofill</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <h1>ChatGPT Autofill</h1>

      <label for="apiKey">OpenAI API-Key</label>
      <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />

      <label for="model">Modell</label>
      <select id="model">
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
        <option value="gpt-4.1">gpt-4.1</option>
      </select>

      <label for="uiTheme">Theme</label>
      <select id="uiTheme">
        <option value="system">System</option>
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>

      <div class="row">
        <button id="saveBtn">Speichern</button>
        <button id="clearHistoryBtn" class="secondary">History loeschen</button>
      </div>
      <div id="status" class="status"></div>

      <h2>Prompt History</h2>
      <ul id="historyList" class="history"></ul>
      <p class="hint">Tipp: Rechtsklick auf ein Feld und "Mit ChatGPT ausfuellen..." nutzen.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
